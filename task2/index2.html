<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Component</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="card">
        <img src="shopping.webp" alt="Card Image" class="card-image">

        <div class="card-content">
            <h2 class="card-title">Iphoness</h2>

            <p class="card-description">
                Explore the new collection in iphone
                around the world Start your journey today.
            </p>



            <button class="card-button"> Explore Now</button>
        </div>
    </div>

</body>
</html>
